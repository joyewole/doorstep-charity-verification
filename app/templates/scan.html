{% extends "base.html" %}
{% block content %}
  <div class="card">
    <h2>Scan QR</h2>
    <p class="muted">Use your phone camera to scan a QR code and verify the campaign.</p>

    <div id="reader" style="width:100%; max-width:420px;"></div>
    <p class="muted" style="margin-top:10px;">
      If prompted, allow camera access.
    </p>

    <div class="actions">
      <a class="btn outline" href="/reverse/jo5/">Back</a>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    const onScanSuccess = (decodedText) => {
      if (decodedText.startsWith("http")) {
        window.location.href = decodedText;
      } else {
        const url = "{{ url_for('public.verify_page') }}" + "?token=" + encodeURIComponent(decodedText);
        window.location.href = url;
      }
    };

    const onScanFailure = (error) => {
    };

    const html5QrcodeScanner = new Html5QrcodeScanner(
      "reader",
      { fps: 10, qrbox: 250 },
      false
    );
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
  </script>
{% endblock %}
