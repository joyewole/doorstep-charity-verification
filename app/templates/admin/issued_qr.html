{% extends "base.html" %}
{% block content %}

<div class="card">
  <h2>Issued QR Code</h2>
  <p class="muted">Scan this QR code to verify the campaign.</p>

  <p><strong>Charity:</strong> {{ charity.name }} ({{ charity.registration_number }})</p>
  <p><strong>Campaign:</strong> {{ campaign.title }}</p>
  <p><strong>Expires:</strong> {{ issued.expires_at }}</p>

  <div style="margin-top: 16px;">
    <img src="{{ url_for('admin.issued_qr_png', issued_id=issued.id) }}" alt="QR Code" style="max-width: 320px; width: 100%; border-radius: 12px; border: 1px solid #e5e7eb;">
  </div>

  <div style="margin-top: 16px;">
    <a class="btn" href="{{ url_for('admin.dashboard') }}">Back to Dashboard</a>
  </div>
</div>

{% endblock %}
