{% extends "base.html" %}
{% block content %}
  <div class="card">
    <h2>Add Campaign</h2>

    {% if not charities %}
      <p class="muted">You must create a charity first.</p>
      <a class="btn" href="{{ url_for('admin.create_charity') }}">Add Charity</a>
      <a class="btn" href="{{ url_for('admin.dashboard') }}" style="background:#475569; margin-left:8px;">Back</a>
    {% else %}
      <form method="POST" action="{{ url_for('admin.create_campaign') }}">
        <label><strong>Charity</strong></label><br/>
        <select name="charity_id" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;" required>
          {% for c in charities %}
            <option value="{{ c.id }}">{{ c.name }} ({{ c.registration_number }})</option>
          {% endfor %}
        </select>
        <br/><br/>

        <label><strong>Campaign Title</strong></label><br/>
        <input name="title" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;" required>
        <br/><br/>

        <label><strong>Description (optional)</strong></label><br/>
        <textarea name="description" rows="3" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;"></textarea>
        <br/><br/>

        <label><strong>Start Date/Time</strong></label><br/>
        <input type="datetime-local" name="starts_at" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;" required>
        <br/><br/>

        <label><strong>End Date/Time</strong></label><br/>
        <input type="datetime-local" name="ends_at" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;" required>
        <br/><br/>

        <button type="submit" class="btn" style="border:none; cursor:pointer;">Save Campaign</button>
        <a href="{{ url_for('admin.report_dashboard') }}" class="btn" style="background:#475569; margin-left:8px;">Back</a>
      </form>
    {% endif %}
  </div>
{% endblock %}
